      - Legacy Modernization: workshops/by-domain/modernization/legacy/README.md
      - .NET Cloud-Native: workshops/by-domain/modernization/dotnet-cloud-native/README.md
      - Framework Upgrades: workshops/by-domain/modernization/framework-upgrades/README.md
      - Data Source Migration: workshops/by-domain/modernization/data-source-migration/README.md
      - Platform Decomposition: workshops/by-domain/modernization/platform-decomposition/README.md
      - Security Compliance: workshops/by-domain/security/compliance/README.md
      - Enterprise Security Automation: workshops/by-domain/security/enterprise-automation/README.md
