site_name: Devin Workshop Hub
site_description: Self-paced labs, training, and demos for Devin hands-on workshops
site_url: https://cognition-partner-workshops.github.io/workshop-metadata/

docs_dir: docs

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.integrate
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

repo_url: https://github.com/Cognition-Partner-Workshops/workshop-metadata
repo_name: workshop-metadata

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
  - tags

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Cognition-Partner-Workshops

extra_css:
  - assets/stylesheets/extra.css

exclude_docs: |
  .git/
  .github/
  node_modules/
  __pycache__/
  site/

validation:
  links:
    not_found: info
    absolute_links: ignore
    unrecognized_links: ignore

