    - Security: labs/security/README.md
    - Data Engineering: labs/data-engineering/README.md
    - Migration & Modernization: labs/migration-modernization/README.md
    - Application Development: labs/application-development/README.md
    - Testing & QA: labs/testing-qa/README.md
    - DevOps & CI/CD: labs/devops-cicd/README.md
    - Cloud & Infrastructure: labs/cloud-infrastructure/README.md
    - Observability & SRE: labs/observability-sre/README.md
    - Architecture & Design: labs/architecture-design/README.md
    - AI & ML Engineering: labs/ai-ml-engineering/README.md
    - Compliance & Governance: labs/compliance-governance/README.md
    - Technical Documentation: labs/technical-documentation/README.md
    - Devin Features Checklist: labs/devin-features/README.md
  - Workshops:
    - Overview: workshops/README.md
    - General: workshops/general/README.md
    - OtterWorks: workshops/otterworks/README.md
    - By Role:
      - App Maintenance: workshops/by-role/development/app-maintenance/README.md
      - Feature Development: workshops/by-role/development/feature-development/README.md
      - Digital Engineering: workshops/by-role/digital-engineering/README.md
      - Quality Engineering: workshops/by-role/quality-engineering/engineering/README.md
      - Quality Engineering & Security: workshops/by-role/quality-engineering/engineering-security/README.md
    - By Domain:
